name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.1"
      - run: cargo install toq-cli --version "0.1.0-dev.1"
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm test
        env:
          TOQ_BIN: toq
